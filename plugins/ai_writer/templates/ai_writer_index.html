{% extends "base.html" %}
{% block title %}الكاتب الذكي - Marketing OS{% endblock %}
{% block content %}
<div class="tool-header">
    <h1>✍️ الكاتب الذكي</h1>
    <p>كتابة وتحرير النصوص التسويقية بالذكاء الاصطناعي</p>
</div>

<div class="tool-section">
    <div class="tool-card">
        <div class="form-group">
            <label>نوع المهمة</label>
            <select id="mode" class="input-field">
                <option value="copywriting">📝 كتابة إعلانية (Copywriting)</option>
                <option value="editing">✏️ تحرير وتحسين (Copy Editing)</option>
                <option value="strategy">📊 استراتيجية محتوى (Content Strategy)</option>
            </select>
        </div>
        <div class="form-group">
            <label>المدخلات / النص</label>
            <textarea id="prompt" class="input-field textarea" rows="6" placeholder="اكتب وصف المنتج، الفكرة، أو النص المطلوب تحريره..."></textarea>
        </div>
        <button onclick="generate()" class="btn btn-gold">توليد النص</button>
    </div>

    <div class="tool-card" id="result-card" style="display:none;">
        <div class="form-group">
            <label>النتيجة</label>
            <div id="result" class="result-box"></div>
        </div>
        <button onclick="copyResult()" class="btn btn-ghost" id="copyBtn">نسخ النتيجة</button>
        <span id="copyMsg" style="color:var(--gold);font-size:13px;margin-right:10px;display:none;">تم النسخ ✓</span>
    </div>
</div>

<script>
async function generate() {
    const prompt = document.getElementById('prompt').value;
    const mode = document.getElementById('mode').value;
    if (!prompt) { alert('الرجاء كتابة النص المطلوب'); return; }

    const btn = event.target;
    btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-left:6px;"></span> جارٍ التوليد...';
    btn.disabled = true;

    const res = await fetch('/plugin/ai-writer/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt, mode})
    });
    const data = await res.json();

    btn.textContent = 'توليد النص';
    btn.disabled = false;

    if (data.error) {
        if (data.retry_after) {
            startCountdown(btn, data.retry_after);
        } else {
            alert(data.error);
        }
        return;
    }

    const resultEl = document.getElementById('result');
    resultEl.textContent = data.result;
    resultEl.style.whiteSpace = 'pre-wrap';
    document.getElementById('result-card').style.display = 'block';
}

function startCountdown(btn, seconds) {
    btn.disabled = true;
    var remaining = seconds;
    btn.textContent = 'انتظر ' + remaining + ' ثانية...';
    var timer = setInterval(function() {
        remaining--;
        if (remaining <= 0) {
            clearInterval(timer);
            btn.textContent = 'توليد النص';
            btn.disabled = false;
        } else {
            btn.textContent = 'انتظر ' + remaining + ' ثانية...';
        }
    }, 1000);
}

function copyResult() {
    const text = document.getElementById('result').textContent;
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        const msg = document.getElementById('copyMsg');
        msg.style.display = 'inline';
        setTimeout(function() { msg.style.display = 'none'; }, 2000);
    } catch (e) {
        alert('تعذر النسخ، حدد النص يدوياً وانسخه Ctrl+C');
    }
    document.body.removeChild(textarea);
}
</script>
{% endblock %}
