{% extends "base.html" %}
{% block title %}إنشاء حساب - Marketing OS{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <div class="logo">✦ Marketing <span>OS</span></div>
    <h2>إنشاء حساب جديد</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label>الاسم</label>
            <input type="text" name="name" class="input-field" placeholder="اسمك" required>
        </div>
        <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input type="email" name="email" class="input-field" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" name="password" class="input-field" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-gold" style="width:100%">تسجيل</button>
    </form>
    <div class="auth-link">
        عندك حساب؟ <a href="{{ url_for('auth.login') }}">سجّل دخول</a>
    </div>
</div>
{% endblock %}
